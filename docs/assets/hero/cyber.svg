<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title">
  <title>Cyber hero art</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06030f"/>
      <stop offset="100%" stop-color="#0d1530"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#ff4dd2"/>
      <stop offset="100%" stop-color="#5b21b6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="600" cy="170" r="180" fill="url(#sun)"/>
  <g stroke="#00e5ff" stroke-opacity="0.35">
    <path d="M0 530 H1200"/>
    <path d="M0 560 H1200"/>
    <path d="M0 590 H1200"/>
    <path d="M0 620 H1200"/>
    <path d="M0 650 H1200"/>
    <path d="M0 680 H1200"/>
  </g>
  <g stroke="#a855f7" stroke-opacity="0.4" fill="none">
    <path d="M600 350 L1200 720"/>
    <path d="M600 350 L0 720"/>
    <path d="M600 350 L900 720"/>
    <path d="M600 350 L300 720"/>
  </g>
  <g fill="#ffffff" fill-opacity="0.8">
    <circle cx="120" cy="80" r="2"/><circle cx="210" cy="120" r="1.5"/><circle cx="980" cy="70" r="2"/>
    <circle cx="1060" cy="170" r="1.8"/><circle cx="430" cy="60" r="1.7"/><circle cx="720" cy="90" r="1.5"/>
  </g>
