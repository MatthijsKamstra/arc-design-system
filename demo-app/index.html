<!DOCTYPE html>
<html lang="nl">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Dashboard — WebComponents App</title>
	<link rel="stylesheet" href="css/app.css" />
</head>

<body>

	<ui-nav current="index.html"></ui-nav>

	<div class="container">
		<h1 class="mb-1">Dashboard</h1>
		<p class="text-muted mb-4">Overzicht van de applicatie</p>

		<div class="row g-3 mb-4">
			<div class="col-sm-6 col-lg-3">
				<div class="card text-center">
					<div class="card-body">
						<div class="display-6 fw-bold text-primary">24</div>
						<div class="text-muted small">Gebruikers</div>
					</div>
				</div>
			</div>
			<div class="col-sm-6 col-lg-3">
				<div class="card text-center">
					<div class="card-body">
						<div class="display-6 fw-bold text-success">8</div>
						<div class="text-muted small">Actief vandaag</div>
					</div>
				</div>
			</div>
			<div class="col-sm-6 col-lg-3">
				<div class="card text-center">
					<div class="card-body">
						<div class="display-6 fw-bold text-warning">3</div>
						<div class="text-muted small">Openstaande taken</div>
					</div>
				</div>
			</div>
			<div class="col-sm-6 col-lg-3">
				<div class="card text-center">
					<div class="card-body">
						<div class="display-6 fw-bold text-danger">1</div>
						<div class="text-muted small">Waarschuwingen</div>
					</div>
				</div>
			</div>
		</div>

		<div class="card">
			<div class="card-header fw-semibold">Recente activiteit</div>
			<ul class="list-group list-group-flush">
				<li class="list-group-item d-flex justify-content-between align-items-center">
					Jan de Vries heeft ingelogd
					<span class="badge bg-secondary">5 min geleden</span>
				</li>
				<li class="list-group-item d-flex justify-content-between align-items-center">
					Instellingen bijgewerkt
					<span class="badge bg-secondary">1 uur geleden</span>
				</li>
				<li class="list-group-item d-flex justify-content-between align-items-center">
					Nieuwe gebruiker aangemaakt
					<span class="badge bg-secondary">gisteren</span>
				</li>
			</ul>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script type="module" src="js/app.js"></script>
</body>

</html>
