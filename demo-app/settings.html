<!DOCTYPE html>
<html lang="nl">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Instellingen — WebComponents App</title>
	<link rel="stylesheet" href="css/app.css" />
</head>

<body>

	<ui-nav current="settings.html"></ui-nav>

	<div class="container">
		<h1 class="mb-1">Instellingen</h1>
		<p class="text-muted mb-4">Configureer de applicatie</p>

		<div class="row g-4">
			<div class="col-md-6">
				<div class="card">
					<div class="card-header fw-semibold">Algemeen</div>
					<div class="card-body">
						<div class="mb-3">
							<label class="form-label">Applicatienaam</label>
							<input type="text" class="form-control" value="WebComponents App" />
						</div>
						<div class="mb-3">
							<label class="form-label">Taal</label>
							<select class="form-select">
								<option selected>Nederlands</option>
								<option>English</option>
							</select>
						</div>
						<button class="btn btn-primary">Opslaan</button>
					</div>
				</div>
			</div>

			<div class="col-md-6">
				<div class="card">
					<div class="card-header fw-semibold">Notificaties</div>
					<div class="card-body">
						<div class="form-check form-switch mb-3">
							<input class="form-check-input" type="checkbox" id="emailNotif" checked />
							<label class="form-check-label" for="emailNotif">E-mailmeldingen</label>
						</div>
						<div class="form-check form-switch mb-3">
							<input class="form-check-input" type="checkbox" id="loginNotif" />
							<label class="form-check-label" for="loginNotif">Melding bij inloggen</label>
						</div>
						<div class="form-check form-switch mb-3">
							<input class="form-check-input" type="checkbox" id="reportNotif" checked />
							<label class="form-check-label" for="reportNotif">Wekelijks rapport</label>
						</div>
						<button class="btn btn-primary">Opslaan</button>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script type="module" src="js/app.js"></script>
</body>

</html>
